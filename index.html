<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calculator.css">
    <script src="calculator.js" defer ></script>
</head>
<body>
<div class="calculator">
    <div class="displays" id="display"></div>
<!-- <input type="text" id="display" readonly> -->
    <div class="buttons">
  <button class="btn clear" id="clear">AC</button>
  <button class="btn" id="del">del</button>
  <button class="btn" id="sqrt">√</button>
  <button class="btn" id="mod">%</button>

  <button class="btn" id="seven">7</button>
  <button class="btn" id="eight">8</button>
  <button class="btn" id="nine">9</button>
  <button class="btn operator" id="divide">/</button>

  <button class="btn" id="four">4</button>
  <button class="btn" id="five">5</button>
  <button class="btn" id="six">6</button>
   <button class="btn operator" id="mul">*</button> 

  <button class="btn" id="one">1</button>
  <button class="btn" id="two">2</button>
  <button class="btn" id="three">3</button>
  <button class="btn operator" id="sub">-</button>

  <button class="btn" id="zero">0</button>
  <button class="btn" id="dot">.</button>
  <button class="btn" id="adds">+</button>
  <button class="btn equals" id="equals">=</button>
</div>
</div> 
      

      


    
</body>
</html>
